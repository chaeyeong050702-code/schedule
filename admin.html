<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>스케줄 신청</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
}

input, select {
  margin: 5px;
  padding: 5px;
  font-size: 13px;
}

.day {
  margin-bottom: 10px;
}

.reason {
  display: none;
}
</style>
</head>

<body>

<h1>직원 스케줄 신청</h1>

<input type="text" id="name" placeholder="이름"><br><br>

<div id="days"></div>

<button onclick="submitSchedule()">제출</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0v6EFmB9eXPJDys7V6esaE04BE4kneNk",
  authDomain: "schedule-app-29adb.firebaseapp.com",
  projectId: "schedule-app-29adb",
  storageBucket: "schedule-app-29adb.firebasestorage.app",
  messagingSenderId: "361799855411",
  appId: "1:361799855411:web:9e79d6bc36aabdf926e246"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const days = ["sun","mon","tue","wed","thu","fri","sat"];
const names = ["일","월","화","수","목","금","토"];

const container = document.getElementById("days");

// UI 생성
days.forEach((d,i)=>{
  container.innerHTML += `
    <div class="day">
      <b>${names[i]}</b>

      <input id="${d}Time" placeholder="근무 가능 시간 입력">

      <select id="${d}Type" onchange="toggleReason('${d}')">
        <option value="">선택</option>
        <option value="work">근무 가능</option>
        <option value="D/O">D/O</option>
      </select>

      <span id="${d}ReasonBox" class="reason">
        <input id="${d}Reason" placeholder="주말 D/O 사유 (필수)">
      </span>
    </div>
  `;
});

// 주말 사유 표시
window.toggleReason = function(day){
  const type = document.getElementById(day+"Type").value;
  const box = document.getElementById(day+"ReasonBox");

  box.style.display = (day==="sun"||day==="sat") && type==="D/O"
    ? "inline"
    : "none";
};

// 스케줄 생성
function makeSchedule(day){

  const type = document.getElementById(day+"Type").value;
  const time = document.getElementById(day+"Time").value;
  const reason = document.getElementById(day+"Reason")?.value;

  if (!type) throw `${day} 선택 안함`;

  if (type==="D/O"){
    if ((day==="sun"||day==="sat") && !reason){
      throw "주말 D/O 사유 필수!";
    }
    return "D/O";
  }

  if (!time) throw `${day} 시간 입력 안함`;

  return time;
}

// 제출
window.submitSchedule = async function(){

  const name = document.getElementById("name").value;

  if (!name){
    alert("이름 입력!");
    return;
  }

  try {

    const schedule = {};
    const reason = {};

    days.forEach(d=>{
      schedule[d] = makeSchedule(d);
      reason[d] = document.getElementById(d+"Reason")?.value || "";
    });

    const data = {
      name,
      schedule,
      reason
    };

    await setDoc(doc(db,"schedules",name), data);

    alert("제출 완료!");

  } catch(e){
    alert(e);
  }
};

</script>

</body>
</html>
</script>
