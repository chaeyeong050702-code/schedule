<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>스케줄 신청</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
  font-size: 18px;
}

/* 제목 */
h1 {
  font-size: 24px;
  margin-bottom: 15px;
}

/* 입력 */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* 하루 카드 느낌 */
.day {
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  background: #f9f9f9;
}

/* 요일 */
.day b {
  font-size: 20px;
}

/* 버튼 */
button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  margin-top: 15px;
}

.reason {
  display: none;
}
</style>
</head>

<body>

<h1>스케줄 신청</h1>

<input type="text" id="name" placeholder="이름 입력">

<div id="days"></div>

<button onclick="submitSchedule()">제출하기</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0v6EFmB9eXPJDys7V6esaE04BE4kneNk",
  authDomain: "schedule-app-29adb.firebaseapp.com",
  projectId: "schedule-app-29adb",
  storageBucket: "schedule-app-29adb.firebasestorage.app",
  messagingSenderId: "361799855411",
  appId: "1:361799855411:web:9e79d6bc36aabdf926e246"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const days = ["sun","mon","tue","wed","thu","fri","sat"];
const names = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];

const container = document.getElementById("days");

// UI 생성
days.forEach((d,i)=>{
  container.innerHTML += `
    <div class="day">
      <b>${names[i]}</b>

      <select id="${d}Type" onchange="handleChange('${d}')">
        <option value="">출근 / D.O 선택</option>
        <option value="work">출근</option>
        <option value="D/O">D/O</option>
      </select>

      <input id="${d}Time" placeholder="근무 가능 시간 입력">

      <span id="${d}ReasonBox" class="reason">
        <input id="${d}Reason" placeholder="주말 D/O 사유 입력">
      </span>
    </div>
  `;
});

// 선택 시 동작
window.handleChange = function(day){

  const type = document.getElementById(day+"Type").value;
  const timeInput = document.getElementById(day+"Time");
  const reasonBox = document.getElementById(day+"ReasonBox");

  if (type === "D/O") {
    timeInput.value = "";
    timeInput.disabled = true;

    if (day==="sun" || day==="sat"){
      reasonBox.style.display = "block";
    }
  } else {
    timeInput.disabled = false;
    reasonBox.style.display = "none";
  }
};

// 스케줄 생성
function makeSchedule(day){

  const type = document.getElementById(day+"Type").value;
  const time = document.getElementById(day+"Time").value;
  const reason = document.getElementById(day+"Reason")?.value;

  if (!type) throw `${day} 선택 안함`;

  if (type==="D/O"){
    if ((day==="sun"||day==="sat") && !reason){
      throw "주말 D/O 사유 입력!";
    }
    return "D/O";
  }

  if (!time) throw `${day} 시간 입력 안함`;

  return time;
}

// 제출
window.submitSchedule = async function(){

  const name = document.getElementById("name").value;

  if (!name){
    alert("이름 입력!");
    return;
  }

  try {

    const schedule = {};
    const reason = {};

    days.forEach(d=>{
      schedule[d] = makeSchedule(d);
      reason[d] = document.getElementById(d+"Reason")?.value || "";
    });

    await setDoc(doc(db,"schedules",name), {
      name,
      schedule,
      reason
    });

    alert("제출 완료!");

  } catch(e){
    alert(e);
  }
};

</script>

</body>
</html>
